<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qwerty</title>
  <link id="favicon" rel="icon" type="image/png" href="https://qarty.cfd/q.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    html,
    body {
      min-height: 100vh;
    }

    body {
      overflow: hidden;
      background: radial-gradient(circle at top, #2c0b44, #09090d 55%, #040306 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    #backgroundCanvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
    }

    .window {
      width: min(480px, calc(100vw - 40px));
      min-height: auto;
      padding: 24px;
      border-radius: 28px;
      background: rgba(10, 6, 24, 0.78);
      border: 1px solid rgba(255, 123, 0, 0.22);
      box-shadow: 0 0 40px rgba(166, 0, 255, 0.18), 0 0 90px rgba(255, 119, 0, 0.14);
      display: flex;
      flex-direction: column;
      gap: 18px;
      backdrop-filter: blur(18px);
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .pfp {
      width: 80px;
      height: 80px;
      border-radius: 999px;
      object-fit: cover;
      border: 3px solid transparent;
      background: #1a091b;
      box-shadow: 0 0 0 1px rgba(198, 169, 255, 0.28), 0 0 18px rgba(198, 169, 255, 0.45);
    }

    .name {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 900;
      line-height: 1;
      color: white;
    }

    .bio {
      text-align: center;
      color: #d9d9e4;
      font-size: 0.88rem;
      line-height: 1.5;
      max-width: 400px;
      margin: 0 auto;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .tile {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(12px);
      text-align: center;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .tile:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
    }

    .tile h3 {
      margin-bottom: 6px;
      font-size: 0.95rem;
      color: #fff;
    }

    .tile p {
      color: #d9d9e4;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .tile-note {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(198, 169, 255, 0.16);
      color: #e9e1ff;
      font-size: 0.85rem;
      opacity: 0.95;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-content: start;
    }

    .button {
      min-height: 72px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
    }

    .footer {
      text-align: center;
      margin-top: 4px;
      color: #ffa34d;
      font-size: 0.96rem;
    }

    .footer span {
      color: #ffffff;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .window {
        padding: 18px;
      }

      .tiles {
        grid-template-columns: 1fr;
      }

      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <canvas id="backgroundCanvas"></canvas>

  <div class="window">
    <div class="header">
      <img class="pfp" id="pfp" alt="Profile picture">
      <div class="name" id="name"></div>
    </div>

    <div class="bio" id="bio"></div>

    <div class="tiles" id="tiles"></div>
  </div>

  <script>
    const profile = {
      name: 'qwerty',
      pfp: 'https://qarty.cfd/q.png',
      bio: 'my name is qwerty and i\'m a very experimental person who loves to try new things and make random projects. i\'m also very active on social media and love to connect with new people, so feel free to reach out to me on any of the platforms below.'
    };

    const tilesEl = document.getElementById('tiles');
    const nameEl = document.getElementById('name');
    const pfpEl = document.getElementById('pfp');
    const bioEl = document.getElementById('bio');

    const tileItems = [
      {
        title: 'discord',
        description: 'my discord account, add me if you want i don\'t care. i\'m very active most of the time and active daily',
        copy: 'qwerty_waffle'
      },
      {
        title: 'youtube',
        description: 'my horrible youtube channel, i don\'t really post anything anymore after my fall off, i privated most of my videos.',
        link: 'https://www.youtube.com/@qwerty_waffle'
      },
      {
        title: 'tiktok',
        description: 'my tiktok account where i post random things once in a while when i feel like it, satire content',
        link: 'https://www.tiktok.com/@qwertywaffle'
      },
      {
        title: 'unichat',
        description: 'my experimental website (currently not active but will be back one day)',
        link: 'https://unichat.sbs'
      }
    ];

    nameEl.textContent = profile.name;
    pfpEl.src = profile.pfp;
    pfpEl.alt = `${profile.name} profile picture`;
    bioEl.textContent = profile.bio;

    const faviconEl = document.getElementById('favicon');
    if (faviconEl) {
      faviconEl.href = profile.pfp;
    }

    function showCopyNotice(tile) {
      const note = document.createElement('span');
      note.className = 'tile-note';
      note.textContent = 'Copied!';
      tile.appendChild(note);
      setTimeout(() => note.remove(), 1400);
    }

    tileItems.forEach(item => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.innerHTML = `
        <h3>${item.title}</h3>
        <p>${item.description}</p>
      `;

      if (item.link || item.copy) {
        tile.style.cursor = 'pointer';
      }

      tile.addEventListener('click', () => {
        if (item.link) {
          window.open(item.link, '_blank', 'noopener');
          return;
        }

        if (item.copy) {
          navigator.clipboard.writeText(item.copy).then(() => {
            showCopyNotice(tile);
          }).catch(() => {
            alert('Copy failed.');
          });
        }
      });

      tilesEl.appendChild(tile);
    });

    const canvas = document.getElementById('backgroundCanvas');
    const ctx = canvas.getContext('2d');
    const stars = [];
    const STAR_COUNT = 700;
    const SPEED = 0.08;
    let center = { x: 0, y: 0 };

    class Star {
      constructor() {
        this.reset(true);
      }

      reset(initial) {
        this.angle = Math.random() * Math.PI * 2;
        this.distance = initial ? Math.random() * maxDistance() : 2;
        this.speed = random(18, 70);
        this.fade = 0;
        const lum = Math.floor(random(160, 255));
        this.color = `rgba(${lum}, ${lum}, ${lum}, `;
      }

      update() {
        this.distance += this.speed * SPEED * (this.distance / maxDistance() + 0.16);
        this.fade = Math.min(1, this.fade + 0.014);
        if (this.distance > maxDistance()) {
          this.reset(false);
        }
      }

      draw() {
        const x = Math.cos(this.angle) * this.distance + center.x;
        const y = Math.sin(this.angle) * this.distance + center.y;
        const alpha = Math.min(1, this.fade * (0.72 + this.distance / maxDistance() * 0.28));
        ctx.fillStyle = `${this.color}${alpha})`;
        ctx.fillRect(x, y, 2, 2);
      }
    }

    function random(min, max) {
      return min + Math.random() * (max - min);
    }

    function maxDistance() {
      return canvas.width / 2 + canvas.height / 2;
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      center.x = canvas.width / 2;
      center.y = canvas.height / 2;
    }

    function initStars() {
      stars.length = 0;
      for (let i = 0; i < STAR_COUNT; i += 1) {
        stars.push(new Star());
      }
    }

    function render() {
      ctx.fillStyle = '#020106';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      stars.forEach(star => {
        star.update();
        star.draw();
      });
      requestAnimationFrame(render);
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
      initStars();
    });

    resizeCanvas();
    initStars();
    requestAnimationFrame(render);
  </script>
</body>

</html>
